name: Daily Weather Kalshi Email

on:
  workflow_dispatch:
  schedule:
    # 7:35 AM America/New_York during DST (EDT).
    # On 2026-03-25 (tomorrow), New York is on EDT, so this runs at 7:35 AM ET.
    - cron: "35 11 * * *"

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily pipeline + email
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TOTAL_BUDGET_USD: ${{ secrets.TOTAL_BUDGET_USD }}
          TOP_MOVE_COUNT: ${{ secrets.TOP_MOVE_COUNT }}
          RISK_BUCKET_COUNT: ${{ secrets.RISK_BUCKET_COUNT }}
          MAX_POSITION_PCT: ${{ secrets.MAX_POSITION_PCT }}
          RISKY_ALLOCATION_MULTIPLIER: ${{ secrets.RISKY_ALLOCATION_MULTIPLIER }}
          NO_TRADE_ALLOCATION_MULTIPLIER: ${{ secrets.NO_TRADE_ALLOCATION_MULTIPLIER }}
          CONFIDENCE_TARGET: ${{ secrets.CONFIDENCE_TARGET }}
          EDGE_TARGET: ${{ secrets.EDGE_TARGET }}
          TRADING_ENABLED: ${{ secrets.TRADING_ENABLED }}
          TRADING_DRY_RUN: ${{ secrets.TRADING_DRY_RUN }}
          TRADE_MAX_DAILY_NOTIONAL_USD: ${{ secrets.TRADE_MAX_DAILY_NOTIONAL_USD }}
          TRADE_MAX_PER_TRADE_USD: ${{ secrets.TRADE_MAX_PER_TRADE_USD }}
          TRADE_MIN_ORDER_NOTIONAL_USD: ${{ secrets.TRADE_MIN_ORDER_NOTIONAL_USD }}
          TRADE_MAX_OPEN_ORDERS: ${{ secrets.TRADE_MAX_OPEN_ORDERS }}
          TRADE_MIN_CONTRACTS: ${{ secrets.TRADE_MIN_CONTRACTS }}
          TRADE_MIN_EDGE: ${{ secrets.TRADE_MIN_EDGE }}
          TRADE_MIN_CONFIDENCE: ${{ secrets.TRADE_MIN_CONFIDENCE }}
          TRADE_MAX_SPREAD: ${{ secrets.TRADE_MAX_SPREAD }}
          TRADE_ALLOW_RISKY: ${{ secrets.TRADE_ALLOW_RISKY }}
          TRADE_ALLOW_NO_TRADE_FLAG: ${{ secrets.TRADE_ALLOW_NO_TRADE_FLAG }}
          TRADE_ALLOWED_MARKET_TYPES: ${{ secrets.TRADE_ALLOWED_MARKET_TYPES }}
          TRADE_ORDER_TTL_SECONDS: ${{ secrets.TRADE_ORDER_TTL_SECONDS }}
          TRADE_LEDGER_PATH: ${{ secrets.TRADE_LEDGER_PATH }}
          TRADE_PRICE_IN_CENTS: ${{ secrets.TRADE_PRICE_IN_CENTS }}
          KALSHI_BASE_URL: ${{ secrets.KALSHI_BASE_URL }}
          KALSHI_TIMEOUT_SEC: ${{ secrets.KALSHI_TIMEOUT_SEC }}
          KALSHI_ORDER_PATH: ${{ secrets.KALSHI_ORDER_PATH }}
          KALSHI_KEY_ID: ${{ secrets.KALSHI_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_PRIVATE_KEY_PATH: ${{ secrets.KALSHI_PRIVATE_KEY_PATH }}
          KALSHI_BEARER_TOKEN: ${{ secrets.KALSHI_BEARER_TOKEN }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
          KALSHI_AUTH_HEADER: ${{ secrets.KALSHI_AUTH_HEADER }}
          KALSHI_AUTH_VALUE: ${{ secrets.KALSHI_AUTH_VALUE }}
        run: python daily_run.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: |
            output/**
            history/**
          if-no-files-found: ignore
