name: Daily Weather Kalshi Email

on:
  workflow_dispatch:
  schedule:
    # 7:35 AM America/New_York during DST (EDT).
    # On 2026-03-25 (tomorrow), New York is on EDT, so this runs at 7:35 AM ET.
    - cron: "35 11 * * *"

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily pipeline + email
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TOTAL_BUDGET_USD: ${{ secrets.TOTAL_BUDGET_USD }}
          TOP_MOVE_COUNT: ${{ secrets.TOP_MOVE_COUNT }}
          RISK_BUCKET_COUNT: ${{ secrets.RISK_BUCKET_COUNT }}
        run: python daily_run.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: |
            output/**
            history/**
          if-no-files-found: ignore
