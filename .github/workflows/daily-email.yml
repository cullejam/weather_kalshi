name: Daily Weather Kalshi Email

on:
  workflow_dispatch:
  schedule:
    # 8:00 AM America/New_York shifts between 12:00 UTC (EDT) and 13:00 UTC (EST).
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate to 8:00 AM ET only
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now_et = datetime.now(ZoneInfo("America/New_York"))
          run_ok = now_et.hour == 8
          with open("/tmp/should_run.txt", "w", encoding="utf-8") as f:
              f.write("true" if run_ok else "false")
          print(f"ET now: {now_et.isoformat()} | should_run={run_ok}")
          PY
          echo "should_run=$(cat /tmp/should_run.txt)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run daily pipeline + email
        if: steps.gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TOTAL_BUDGET_USD: ${{ secrets.TOTAL_BUDGET_USD }}
          TOP_MOVE_COUNT: ${{ secrets.TOP_MOVE_COUNT }}
          RISK_BUCKET_COUNT: ${{ secrets.RISK_BUCKET_COUNT }}
        run: python daily_run.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: |
            output/**
            history/**
          if-no-files-found: ignore
